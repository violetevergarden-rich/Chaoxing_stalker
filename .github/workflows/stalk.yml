name: ChaoXing Stalker

on:
  schedule:
    # UTC 0:00 = 北京时间 8:00, UTC 12:00 = 北京时间 20:00
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: python3 stalker.py --one-shot
