name: ChaoXing Stalker

on:
  schedule:
    # 北京时间 12:03 和 18:03（UTC 04:03 / 10:03，避开 :00 整点抢占）
    - cron: "3 4,10 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify config secret
        run: |
          if [ -z "$CONFIG_JSON" ]; then
            echo "ERROR: CONFIG_JSON secret is empty or not set."
            echo "Go to Settings → Secrets → Actions → New repository secret"
            echo "Name: CONFIG_JSON"
            echo "Value: (paste the full content of stalker_config.json)"
            exit 1
          fi
          echo "CONFIG_JSON is set ($(echo "$CONFIG_JSON" | wc -c) bytes)"
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: stalker_state.json
          key: stalker-state-${{ github.run_id }}
          restore-keys: stalker-state-

      - name: Run check
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: python3 stalker.py --one-shot
